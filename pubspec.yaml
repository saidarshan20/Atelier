name: atelier
description: "A local-first personal to-do app — Digital Atelier."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.29

  # State
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI / Calendar
  table_calendar: ^3.1.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Export / Share
  share_plus: ^10.1.4

  # Utilities
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  intl: ^0.20.2
  timezone: ^0.9.4
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  dynamic_color: ^1.8.1
  flutter_timezone: ^5.0.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
